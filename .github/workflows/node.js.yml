name: Node.js CI

on:
  pull_request:
    branches:
      - next
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0 # Disable husky hooks in CI to speed up pnpm install

    strategy:
      matrix:
        node-version: [22.18.0]

    steps:
      # =======================================================================
      # STEP 1: INITIALIZE ENVIRONMENT
      # =======================================================================
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is required to allow 'git checkout' of other branches
          fetch-depth: 0
          clean: true

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # =======================================================================
      # STEP 2: GENERATE BASELINE (The Folder Swap)
      # =======================================================================
      - name: Generate Deprecation Baseline from Target Branch
        run: |
          echo "Moving current tokens to backup..."
          mv tokens/global tokens/global-pr-backup

          echo "Pulling token data from ${{ github.base_ref }}..."
          # This specifically fetches ONLY the tokens from the base branch (master/next)
          git checkout origin/${{ github.base_ref }} -- tokens/global

          echo "Running baseline generation script..."
          npx tsx scripts/generate-baseline.ts

          echo "Restoring PR tokens..."
          rm -rf tokens/global
          mv tokens/global-pr-backup tokens/global

      # =======================================================================
      # STEP 3: STATIC ANALYSIS & GATES (Pre-Build)
      # =======================================================================
      - name: Check formatting
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Enforce Canonical Module Contract
        run: npx tsx scripts/validate-contract.ts

      - name: Enforce Rename & Deletion Governance
        # This compares current tokens against the baseline.json created in Step 2
        run: npx tsx scripts/enforce-deletions.ts

      # =======================================================================
      # STEP 4: TEST & COMPILE
      # =======================================================================
      - name: Test
        run: pnpm test

      - name: Build Tokens
        run: pnpm build

      # =======================================================================
      # STEP 5: POST-BUILD PARITY CHECKS
      # =======================================================================
      - name: Validate Syntax Boundaries
        run: npx tsx scripts/validate-syntax-boundaries.ts

      - name: Validate Output Parity & Scope Leaks
        run: npx tsx scripts/validate-output-parity.ts

      # =======================================================================
      # STEP 6: POST-BUILD TYPE COMPILE CHECKS
      # =======================================================================

      - name: Consumer type compile check
        run: pnpm run test:consumer-types
